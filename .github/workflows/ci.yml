name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24

      - name: Install pnpm
        run: npm install --global pnpm@11.0.7

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check version sync
        run: pnpm run check:version

      - name: Type check
        run: pnpm run type-check

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm run build

      - name: Audit
        run: pnpm audit --audit-level=low

      - name: Package and inspect Web Store ZIP
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          ZIP="release/usemycurrentaccount-plusplus-v${VERSION}-chrome-webstore.zip"
          mkdir -p release
          (cd dist && zip -qr "../${ZIP}" . -x "*.DS_Store" "*.map")
          test "$(unzip -Z1 "$ZIP" | head -n 1)" != "dist/"
          unzip -p "$ZIP" manifest.json > /tmp/manifest.json
          node -e 'const m=require("/tmp/manifest.json"); if(m.manifest_version !== 3) throw new Error("Expected Manifest V3");'
          unzip -p "$ZIP" LICENSE.txt | grep -Fq "UseMyCurrentAccount++ contributors"
          unzip -p "$ZIP" THIRD_PARTY_NOTICES.txt | grep -Fq "Copyright (c) Meta Platforms, Inc. and affiliates."

      - name: Upload Web Store ZIP artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: chrome-webstore-zip
          path: release/usemycurrentaccount-plusplus-v*-chrome-webstore.zip
          if-no-files-found: error
