name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: chrome-web-store-release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify-package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact tag
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify tagged commit is on main
        run: |
          git fetch origin main --no-tags
          TAG_COMMIT="$(git rev-parse "${GITHUB_SHA}^{commit}")"
          git merge-base --is-ancestor "$TAG_COMMIT" origin/main

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24

      - name: Install pnpm
        run: npm install --global pnpm@11.0.7

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify tag and version consumers
        run: pnpm run check:version

      - name: Type check
        run: pnpm run type-check

      - name: Test
        run: pnpm test

      - name: Audit
        run: pnpm audit --audit-level=low

      - name: Build
        run: pnpm run build

      - name: Package and verify Web Store ZIP
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ZIP="release/usemycurrentaccount-plusplus-v${VERSION}-chrome-webstore.zip"
          mkdir -p release
          (cd dist && zip -qr "../${ZIP}" . -x "*.DS_Store" "*.map")
          unzip -p "$ZIP" manifest.json > /tmp/usemycurrentaccount-manifest.json
          node -e 'const m=require("/tmp/usemycurrentaccount-manifest.json"); if(m.version !== process.env.GITHUB_REF_NAME.slice(1)) throw new Error(`ZIP version ${m.version} does not match tag`);'
          unzip -p "$ZIP" LICENSE.txt | grep -Fq "UseMyCurrentAccount++ contributors"
          unzip -p "$ZIP" THIRD_PARTY_NOTICES.txt | grep -Fq "Copyright (c) Meta Platforms, Inc. and affiliates."

      - name: Upload verified ZIP artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: chrome-webstore-zip-${{ github.ref_name }}
          path: release/usemycurrentaccount-plusplus-v*-chrome-webstore.zip
          if-no-files-found: error

  github-release:
    needs: verify-package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download verified ZIP
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: chrome-webstore-zip-${{ github.ref_name }}
          path: release

      - name: Create immutable GitHub release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ZIP="usemycurrentaccount-plusplus-v${VERSION}-chrome-webstore.zip"
          LOCAL="release/${ZIP}"
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name' | grep -Fxq "$ZIP"; then
              mkdir -p /tmp/existing-release
              gh release download "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --pattern "$ZIP" --dir /tmp/existing-release
              cmp "$LOCAL" "/tmp/existing-release/$ZIP" || { echo "Existing release asset differs; refusing to overwrite it." >&2; exit 1; }
            else
              gh release upload "$GITHUB_REF_NAME" "$LOCAL" --repo "$GITHUB_REPOSITORY"
            fi
          else
            gh release create "$GITHUB_REF_NAME" "$LOCAL" --repo "$GITHUB_REPOSITORY" --title "UseMyCurrentAccount++ $GITHUB_REF_NAME" --generate-notes --verify-tag
          fi

  chrome-web-store:
    needs: [verify-package, github-release]
    runs-on: ubuntu-latest
    environment: chrome-web-store
    permissions:
      contents: read
    steps:
      - name: Checkout publisher script
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24

      - name: Download verified ZIP
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: chrome-webstore-zip-${{ github.ref_name }}
          path: release

      - name: Publish to Chrome Web Store
        run: node scripts/publish-chrome-webstore.mjs
        env:
          CHROME_WEBSTORE_CLIENT_ID: ${{ secrets.CHROME_WEBSTORE_CLIENT_ID }}
          CHROME_WEBSTORE_CLIENT_SECRET: ${{ secrets.CHROME_WEBSTORE_CLIENT_SECRET }}
          CHROME_WEBSTORE_REFRESH_TOKEN: ${{ secrets.CHROME_WEBSTORE_REFRESH_TOKEN }}
          CHROME_WEBSTORE_PUBLISHER_ID: ${{ secrets.CHROME_WEBSTORE_PUBLISHER_ID }}
          CHROME_WEBSTORE_EXTENSION_ID: ${{ secrets.CHROME_WEBSTORE_EXTENSION_ID }}
          CHROME_WEBSTORE_ZIP: release/usemycurrentaccount-plusplus-${{ github.ref_name }}-chrome-webstore.zip
